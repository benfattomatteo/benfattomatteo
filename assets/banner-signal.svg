<svg width="1800" height="54" viewBox="0 0 1800 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1800" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="15%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .dash {
        stroke-dasharray: 8 16;
        animation: dash 16s linear infinite;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 1.2s;
      }

      @keyframes dash {
        from { stroke-dashoffset: 180; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1800" height="54" fill="transparent"/>

  <path d="M70 18 H520" stroke="url(#line)" stroke-width="2" opacity="0.75"/>
  <path d="M1280 18 H1730" stroke="url(#line)" stroke-width="2" opacity="0.75"/>

  <path d="M520 18 C650 42 760 8 900 26 C1040 44 1150 10 1280 18" stroke="url(#line)" stroke-width="1.6" opacity="0.55" class="dash"/>

  <circle cx="650" cy="35" r="4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="900" cy="26" r="4" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="1150" cy="20" r="4" fill="#60A5FA" filter="url(#glow)" class="pulse"/>

  <text x="90" y="42" fill="#64748B" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="3">
    SIGNAL VERIFIED // AI CORE ONLINE
  </text>

  <text x="1710" y="42" text-anchor="end" fill="#64748B" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="3">
    LEO CONSTELLATION NODE
  </text>
</svg>
