<svg width="1200" height="118" viewBox="0 0 1200 118" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="80" y1="0" x2="1120" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="18%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.95"/>
      <stop offset="82%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="text" x1="350" y1="0" x2="850" y2="0">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
      }

      .title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 4px;
      }

      .sub {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 3px;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 1s;
      }

      .pulse3 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 2s;
      }

      .dash {
        stroke-dasharray: 8 15;
        animation: dash 14s linear infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }

      @keyframes dash {
        from { stroke-dashoffset: 140; }
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="118" fill="transparent"/>

  <path d="M90 28 H360" stroke="url(#frame)" stroke-width="2" opacity="0.7"/>
  <path d="M840 28 H1110" stroke="url(#frame)" stroke-width="2" opacity="0.7"/>

  <path d="M360 28 C450 66 530 10 600 32 C700 64 760 8 840 28" stroke="url(#frame)" stroke-width="1.6" opacity="0.55" class="dash"/>

  <circle cx="445" cy="48" r="4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="600" cy="32" r="4" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="760" cy="44" r="4" fill="#60A5FA" filter="url(#glow)" class="pulse3"/>

  <text x="600" y="64" text-anchor="middle" class="mono title" fill="url(#text)">
    CONNECT · EXPLORE · BUILD
  </text>

  <text x="600" y="88" text-anchor="middle" class="mono sub" fill="#64748B">
    OPEN TO AI PRODUCTS · FULLSTACK SYSTEMS · AUTOMATION PROJECTS
  </text>

  <rect x="225" y="104" width="750" height="2" rx="1" fill="url(#frame)" opacity="0.65"/>
</svg>
